services:
  web-asa01:
    build:
      context: ./c001-web-asa
      dockerfile: Dockerfile
    image: web-asa
    container_name: c001-web-asa01
    ports:
      - "80:8080"
    volumes:
      - ./c001-web-asa:/usr/share/nginx/html
      - ./c001-web-asa/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - asa-network
  web-asa02:
    build:
      context: ./c002-web-asa
      dockerfile: Dockerfile
    image: web-asa
    container_name: c002-web-asa02
    ports:
      - "81:80"
    volumes:
      - ./c002-web-asa:/usr/share/nginx/html
      - ./c002-web-asa/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - asa-network

networks:
  asa-network:
    driver: bridge
